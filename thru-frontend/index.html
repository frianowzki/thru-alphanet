<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thru Counter — On-Chain</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
        .card { background: #1a1a2e; border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid #2a2a3e; }
        .card h2 { font-size: 1.2rem; margin-bottom: 16px; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
        .counter-display { font-size: 4rem; text-align: center; padding: 20px; background: #0d0d1a; border-radius: 12px; margin-bottom: 20px; font-weight: bold; font-variant-numeric: tabular-nums; }
        .buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .btn { padding: 16px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-inc { background: #00d4ff; color: #000; }
        .btn-dec { background: #ff6b6b; color: #fff; }
        .btn-reset { background: #6c5ce7; color: #fff; }
        .btn-read { background: #00b894; color: #fff; grid-column: span 3; }
        .btn-connect { background: linear-gradient(135deg, #00d4ff, #6c5ce7); color: #fff; width: 100%; padding: 14px; }
        .btn-disconnect { background: #333; color: #888; width: 100%; padding: 10px; font-size: 0.85rem; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 8px; color: #888; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; background: #0d0d1a; border: 1px solid #2a2a3e; border-radius: 8px; color: #fff; font-size: 1rem; font-family: monospace; }
        .input-group input:focus { outline: none; border-color: #00d4ff; }
        .wallet-info { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #0d0d1a; border-radius: 8px; margin-bottom: 16px; }
        .wallet-address { font-family: monospace; font-size: 0.85rem; color: #00d4ff; word-break: break-all; }
        .wallet-balance { font-size: 1.2rem; font-weight: bold; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .badge-connected { background: #00b894; color: #000; }
        .badge-disconnected { background: #333; color: #888; }
        .status { padding: 12px; background: #0d0d1a; border-radius: 8px; margin-top: 16px; font-family: monospace; font-size: 0.85rem; color: #888; max-height: 200px; overflow-y: auto; }
        .status .success { color: #00b894; }
        .status .error { color: #ff6b6b; }
        .status .info { color: #00d4ff; }
        .status .tx { color: #fdcb6e; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { text-align: center; margin-top: 40px; color: #555; font-size: 0.85rem; }
        a { color: #00d4ff; text-decoration: none; }
        .hidden { display: none; }
        .chain-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: #00b89420; border: 1px solid #00b89440; border-radius: 6px; font-size: 0.7rem; color: #00b894; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕊️ Thru Counter</h1>
        <p class="subtitle">Real on-chain counter — Thru Alphanet</p>

        <!-- Wallet Card -->
        <div class="card" id="wallet-card">
            <h2>🔐 Wallet</h2>

            <div id="wallet-connect">
                <p style="color: #888; margin-bottom: 16px; text-align: center;">
                    Connect wallet to interact on-chain
                </p>
                <button class="btn btn-connect" onclick="connectWallet()">
                    Connect Wallet
                </button>
            </div>

            <div id="wallet-info" class="hidden">
                <div class="wallet-info">
                    <div>
                        <div class="wallet-address" id="wallet-address">—</div>
                        <span class="badge badge-connected">Connected <span class="chain-badge">⛓ on-chain</span></span>
                    </div>
                    <div class="wallet-balance" id="wallet-balance">—</div>
                </div>
                <button class="btn-disconnect" onclick="disconnectWallet()">Disconnect</button>
            </div>
        </div>

        <!-- Counter Card -->
        <div class="card" id="counter-card">
            <h2>🔢 Counter</h2>
            <div class="counter-display" id="counter">—</div>
            <div class="buttons">
                <button class="btn btn-dec" id="btn-dec" onclick="execute('decrement')" disabled>−1</button>
                <button class="btn btn-reset" id="btn-reset" onclick="execute('reset')" disabled>Reset</button>
                <button class="btn btn-inc" id="btn-inc" onclick="execute('increment')" disabled>+1</button>
                <button class="btn btn-read" id="btn-read" onclick="readValue()" disabled>Read from Chain</button>
            </div>
        </div>

        <!-- Config Card -->
        <div class="card">
            <h2>⚙️ Config</h2>
            <div class="input-group">
                <label>Program Address</label>
                <input type="text" id="program" value="ta2sYKmgW-b0FQEP2-pMYROxnAIMTrZTgpJqgVvxAHe423">
            </div>
            <div class="input-group">
                <label>PDA Address (Counter Account)</label>
                <input type="text" id="pda" value="tazoq1-tfh31JRP8_oobSNku4zS6p3B_3c1Yw82g9ajUDF">
            </div>
        </div>

        <!-- Activity Log -->
        <div class="card">
            <h2>📋 Activity Log</h2>
            <div class="status" id="log">
                <div class="info">Ready. Connect wallet to start.</div>
            </div>
        </div>

        <div class="footer">
            Built on <a href="https://thru.org">Thru Alphanet</a> ·
            <a href="https://github.com/frianowzki/thru-alphanet">GitHub</a>
        </div>
    </div>

    <script>
        const API = '';  // same origin — backend serves this page
        let walletConnected = false;
        let walletAddress = null;

        const logEl = document.getElementById('log');
        const counterEl = document.getElementById('counter');

        function appendLog(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function api(path, opts = {}) {
            const res = await fetch(API + path, {
                headers: { 'Content-Type': 'application/json' },
                ...opts,
                body: opts.body ? JSON.stringify(opts.body) : undefined,
            });
            return res.json();
        }

        // ── Wallet ──

        async function connectWallet() {
            appendLog('Connecting to wallet...');
            try {
                const data = await api('/api/wallet/balance');
                if (data.error) throw new Error(data.error);

                walletAddress = data.address;
                walletConnected = true;

                document.getElementById('wallet-connect').classList.add('hidden');
                document.getElementById('wallet-info').classList.remove('hidden');
                document.getElementById('wallet-address').textContent = data.address;
                document.getElementById('wallet-balance').textContent = data.balance.toLocaleString();

                document.querySelectorAll('.buttons .btn').forEach(b => b.disabled = false);

                appendLog(`Connected: ${data.address.substring(0, 24)}...`, 'success');
                appendLog(`Balance: ${data.balance} tokens`, 'info');

                // Auto-read counter
                await readValue();
            } catch (err) {
                appendLog(`Error: ${err.message}`, 'error');
            }
        }

        function disconnectWallet() {
            walletConnected = false;
            walletAddress = null;
            document.getElementById('wallet-connect').classList.remove('hidden');
            document.getElementById('wallet-info').classList.add('hidden');
            document.querySelectorAll('.buttons .btn').forEach(b => b.disabled = true);
            counterEl.textContent = '—';
            appendLog('Wallet disconnected');
        }

        // ── Counter ──

        async function readValue() {
            const pda = document.getElementById('pda').value;
            appendLog('Reading counter from chain...');

            try {
                const data = await api(`/api/counter/value?pda=${encodeURIComponent(pda)}`);
                if (data.error) throw new Error(data.error);

                counterEl.textContent = data.value;
                appendLog(`Counter value: ${data.value}`, 'success');
            } catch (err) {
                appendLog(`Read error: ${err.message}`, 'error');
                counterEl.textContent = '?';
            }
        }

        async function execute(action) {
            if (!walletConnected) {
                appendLog('Connect wallet first', 'error');
                return;
            }

            const pda = document.getElementById('pda').value;
            const btn = document.getElementById(`btn-${action === 'increment' ? 'inc' : action === 'decrement' ? 'dec' : action}`);
            const origText = btn?.textContent;

            if (btn) btn.innerHTML = '<span class="loading"></span>';
            setButtons(true);
            appendLog(`Executing ${action}...`);

            try {
                const data = await api('/api/counter/execute', {
                    method: 'POST',
                    body: { pda, action },
                });

                if (data.error && !data.success) throw new Error(data.error);

                if (data.success) {
                    counterEl.textContent = data.value;
                    appendLog(`${action} → value: ${data.value}`, 'success');
                    appendLog(`TX: ${data.signature?.substring(0, 32)}...`, 'tx');
                    appendLog(`CU: ${data.compute_units} | Events: ${data.events}`, 'info');

                    // Refresh balance
                    const bal = await api('/api/wallet/balance');
                    if (bal.balance !== undefined) {
                        document.getElementById('wallet-balance').textContent = bal.balance.toLocaleString();
                    }
                } else {
                    appendLog(`Failed: ${data.error || 'unknown error'}`, 'error');
                }
            } catch (err) {
                appendLog(`Error: ${err.message}`, 'error');
            } finally {
                if (btn) btn.textContent = origText;
                setButtons(false);
            }
        }

        function setButtons(loading) {
            ['btn-inc', 'btn-dec', 'btn-reset', 'btn-read'].forEach(id => {
                document.getElementById(id).disabled = loading;
            });
        }

        // ── Init ──
        appendLog('Thru Counter v7 — Real on-chain execution');
        appendLog('Connect wallet to start.');
    </script>
</body>
</html>
